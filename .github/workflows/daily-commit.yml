name: Daily Automated Commit - DevSync

on:
  schedule:
    - cron: '30 10 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Configure Git for 21f3000245@ds.study.iitm.ac.in
        run: |
          git config user.name "DevSync Bot"
          git config user.email "21f3000245@ds.study.iitm.ac.in"
      
      - name: Create daily activity log for 21f3000245@ds.study.iitm.ac.in
        run: |
          mkdir -p .devsync/logs
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          DATE=$(date -u '+%Y-%m-%d')
          echo "==================================" >> .devsync/logs/activity.log
          echo "Daily Activity: $TIMESTAMP" >> .devsync/logs/activity.log
          echo "Workflow Run: #${{ github.run_number }}" >> .devsync/logs/activity.log
          echo "Repository: ${{ github.repository }}" >> .devsync/logs/activity.log
          echo "Email: 21f3000245@ds.study.iitm.ac.in" >> .devsync/logs/activity.log
          echo "==================================" >> .devsync/logs/activity.log
          echo "" >> .devsync/logs/activity.log
          echo "DevSync Repository Status Report" > .devsync/status_${DATE}.txt
          echo "================================" >> .devsync/status_${DATE}.txt
          echo "Date: $TIMESTAMP" >> .devsync/status_${DATE}.txt
          echo "Branch: ${{ github.ref_name }}" >> .devsync/status_${DATE}.txt
          echo "Commit: ${{ github.sha }}" >> .devsync/status_${DATE}.txt
          echo "Workflow: ${{ github.workflow }}" >> .devsync/status_${DATE}.txt
          echo "Actor: DevSync Automation (21f3000245@ds.study.iitm.ac.in)" >> .devsync/status_${DATE}.txt
          echo "" >> .devsync/status_${DATE}.txt
          echo "This file was generated automatically by GitHub Actions" >> .devsync/status_${DATE}.txt
          echo "as part of DevSync's daily repository update process." >> .devsync/status_${DATE}.txt
          echo "$TIMESTAMP" > .devsync/last_sync.txt
          echo "Last run: $TIMESTAMP" > .last_run.txt
          echo "Email: 21f3000245@ds.study.iitm.ac.in" >> .last_run.txt
      
      - name: Commit and push changes
        run: |
          git add .devsync/ .last_run.txt
          if git diff --staged --quiet; then
            git commit --allow-empty -m "chore: Daily update $(date -u '+%Y-%m-%d %H:%M:%S UTC') [21f3000245@ds.study.iitm.ac.in]"
          else
            git commit -m "chore: Daily update $(date -u '+%Y-%m-%d %H:%M:%S UTC') [21f3000245@ds.study.iitm.ac.in]"
          fi
          git pull --rebase origin main || true
          git push
      
      - name: Workflow completion summary
        run: |
          echo "================================================"
          echo "Daily Commit Workflow Completed Successfully"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Run Number: #${{ github.run_number }}"
          echo "Email: 21f3000245@ds.study.iitm.ac.in"
          echo "================================================"
